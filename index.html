<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Website Change Detector</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h2>🌐 Website Change Detector</h2>
        <p class="subtitle">Simple Monitoring System</p>

        <input type="text" id="urlInput" placeholder="Enter website URL (e.g. google.com)">

        <button onclick="checkWebsite()">Check Website</button>

        <div id="resultBox">
            <p id="result">Enter a URL and click check</p>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
